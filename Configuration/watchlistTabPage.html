<!DOCTYPE html>
<html>
<head>
    <title>Watchlist</title>
    <style>
        #watchlistTabPage { padding: 1.5em 2em; }
        #watchlistTabPage h2 { margin: 0 0 1em; font-size: 1.4em; font-weight: 600; }
        #wlEmpty { display: none; text-align: center; padding: 4em 1em; opacity: 0.55; font-size: 1em; }
        #wlEmpty.visible { display: block; }
        #wlLoading { text-align: center; padding: 4em 1em; opacity: 0.55; }
        #wlGrid { display: flex; flex-wrap: wrap; gap: 1em; }
    </style>
</head>
<body>
<div id="watchlistTabPage" data-role="page">
    <div data-role="content">
        <div class="content-primary">
            <div class="sectionTitleContainer flex align-items-center" style="margin-bottom:1em;">
                <h2 class="sectionTitle">My Watchlist</h2>
            </div>
            <div id="wlLoading">Loading…</div>
            <div id="wlEmpty">
                <p>Your watchlist is empty.</p>
                <p>Tap the <strong>🔖</strong> icon on any movie or series to add it here.</p>
            </div>
            <div id="wlGrid" class="itemsContainer vertical-wrap"></div>
        </div>
    </div>

    <script type="text/javascript">
    (function () {
        var page = document.getElementById('watchlistTabPage');

        // Read an ApiClient property that may be a method or a getter/plain value.
        function apiVal(c, name) {
            var v = c[name];
            return typeof v === 'function' ? v.call(c) : v;
        }

        function buildAuthHeader(c) {
            var token = apiVal(c, 'accessToken');
            if (!token && c._serverInfo) token = c._serverInfo.AccessToken;
            if (!token) return null;
            return 'MediaBrowser ' + [
                'Client="'   + (apiVal(c, 'appName')            || 'Jellyfin Web') + '"',
                'Device="'   + (apiVal(c, 'deviceName')         || 'Browser')      + '"',
                'DeviceId="' + (apiVal(c, 'deviceId')           || 'unknown')      + '"',
                'Version="'  + (apiVal(c, 'applicationVersion') || '1.0.0')        + '"',
                'Token="'    + token + '"'
            ].join(', ');
        }

        function getUserId(c) {
            // Try common method names across Jellyfin web versions.
            var id = apiVal(c, 'getCurrentUserId') || apiVal(c, 'currentUserId');
            if (!id && c._currentUser) id = c._currentUser.Id;
            if (!id && c.currentUser)  id = c.currentUser.Id;
            return id || null;
        }

        async function loadWatchlist() {
            var loading = document.getElementById('wlLoading');
            var empty   = document.getElementById('wlEmpty');
            var grid    = document.getElementById('wlGrid');

            loading.style.display = '';
            empty.classList.remove('visible');
            grid.innerHTML = '';

            var c = window.ApiClient;
            if (!c) {
                loading.style.display = 'none';
                showError(grid, 'ApiClient not available');
                return;
            }

            var authHeader = buildAuthHeader(c);
            if (!authHeader) {
                loading.style.display = 'none';
                showError(grid, 'Not authenticated');
                return;
            }

            try {
                var resp = await fetch('/Watchlist/Items', {
                    headers: { 'X-Emby-Authorization': authHeader }
                });
                if (!resp.ok) throw new Error('GET /Watchlist/Items returned ' + resp.status);
                var entries = await resp.json();

                loading.style.display = 'none';

                if (!entries || entries.length === 0) {
                    empty.classList.add('visible');
                    return;
                }

                var ids    = entries.map(function (e) { return e.jellyfinItemId; }).join(',');
                var userId = getUserId(c);
                if (!userId) throw new Error('Could not determine current userId');

                var items = await c.getItems(userId, {
                    Ids:              ids,
                    Fields:           'PrimaryImageAspectRatio,Overview',
                    ImageTypeLimit:   1,
                    EnableImageTypes: 'Primary,Thumb,Backdrop'
                });

                if (!items || !items.Items || items.Items.length === 0) {
                    empty.classList.add('visible');
                    return;
                }

                require(['cardBuilder'], function (cardBuilder) {
                    cardBuilder.buildCards(items.Items, {
                        itemsContainer:    grid,
                        shape:             'portrait',
                        showTitle:         true,
                        showYear:          true,
                        overlayPlayButton: true,
                        overlayMoreButton: true,
                        centerText:        false,
                        cardLayout:        false,
                        serverId:          apiVal(c, 'serverId')
                    });
                });
            } catch (e) {
                loading.style.display = 'none';
                showError(grid, e.message);
            }
        }

        function showError(grid, msg) {
            var p = document.createElement('p');
            p.style.color = '#f87171';
            p.textContent = 'Watchlist error: ' + msg;
            grid.appendChild(p);
        }

        page.addEventListener('pageshow', loadWatchlist);
    })();
    </script>
</div>
</body>
</html>
