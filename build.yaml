framework: "net9.0"
owner: "Ary"
category: "General"
overview: "Per-user watchlist with home-screen row and library tab."
description: >-
  Bookmark any movie or series from its detail page. Bookmarked items appear
  in a home-screen row (requires HomeScreenSections plugin) and a dedicated
  Watchlist tab (requires CustomTabs plugin). Items auto-remove when marked
  as played.
artifacts:
  - "Jellyfin.Plugin.Watchlist.dll"
changelog: |-
  Fix X-Emby-Authorization header format. v1.0.15.0 joined "MediaBrowser"
  into the array with .join(", ") producing "MediaBrowser, Client=..." but
  Jellyfin requires "MediaBrowser Client=..." (space not comma between the
  scheme name and the first key=value pair). Jellyfin's CustomAuthentication
  handler rejected the malformed header with 401.
