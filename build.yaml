version: "1.0.1.0"
targetAbi: "10.11.0.0"
framework: "net9.0"
owner: "Ary"
category: "General"
overview: "Per-user watchlist with home-screen row and library tab."
description: >-
  Bookmark any movie or series from its detail page. Bookmarked items appear
  in a home-screen row (requires HomeScreenSections plugin) and a dedicated
  Watchlist tab (requires CustomTabs plugin). Items auto-remove when marked
  as played.
artifacts:
  - "Jellyfin.Plugin.Watchlist.dll"
changelog: |-
  Fix bookmark icon injection: switch BookmarkInjectionMiddleware to IMiddleware
  pattern (DI-resolved per request) and add direct-from-disk primary path, matching
  the approach that worked in MissingMediaChecker's ScriptInjectionMiddleware.
  Script is now served via /Watchlist/inject.js endpoint rather than inlined.
