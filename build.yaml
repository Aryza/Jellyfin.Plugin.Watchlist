  class="btnUserRating detailButton ...">, not the userdatabuttons component
  selector from v1.0.9.0. Add btnUserRating + emby-ratingbutton + data-isfavorite
  selectors. Mirror the detailButton-content/icon-span wrapper so the bookmark
  matches the native button's layout exactly.
