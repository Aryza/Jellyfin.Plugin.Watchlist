version: "1.0.15.0"
targetAbi: "10.11.0.0"
framework: "net9.0"
owner: "Ary"
category: "General"
overview: "Per-user watchlist with home-screen row and library tab."
description: >-
  Bookmark any movie or series from its detail page. Bookmarked items appear
  in a home-screen row (requires HomeScreenSections plugin) and a dedicated
  Watchlist tab (requires CustomTabs plugin). Items auto-remove when marked
  as played.
artifacts:
  - "Jellyfin.Plugin.Watchlist.dll"
changelog: |-
  Replace ApiClient.ajax with native fetch + explicit X-Emby-Authorization
  header. ApiClient.ajax's _serverInfo.AccessToken was null in this 10.11
  environment, silently producing 401. Now we extract the token directly
  (accessToken() → _serverInfo → currentUser) and build the full header:
  MediaBrowser Client=..., Device=..., DeviceId=..., Version=..., Token=...
  Also switch controller to [Authorize(AuthenticationSchemes="CustomAuthentication")]
  instead of a policy name, matching what Jellyfin's auth scheme is actually
  registered as.
