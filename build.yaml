targetAbi: "10.11.0.0"
framework: "net9.0"
owner: "Ary"
category: "General"
overview: "Per-user watchlist with home-screen row and library tab."
description: >-
  Bookmark any movie or series from its detail page. Bookmarked items appear
  in a home-screen row (requires HomeScreenSections plugin) and a dedicated
  Watchlist tab (requires CustomTabs plugin). Items auto-remove when marked
  as played.
artifacts:
  - "Jellyfin.Plugin.Watchlist.dll"
changelog: |-
  Diagnostic: replace Console.WriteLine with Jellyfin ILogger (cached statically
  via SetLogger at registrar startup) so Transform invocation count appears in
  Jellyfin logs. Inject extra <meta name="watchlist-plugin-marker"> tag so
  presence in browser DOM can be verified independently of the script execution.
