overview: "Per-user watchlist with home-screen row and library tab."
description: >-
  Bookmark any movie or series from its detail page. Bookmarked items appear
  in a home-screen row (requires HomeScreenSections plugin) and a dedicated
  Watchlist tab (requires CustomTabs plugin). Items auto-remove when marked
  as played.
artifacts:
  - "Jellyfin.Plugin.Watchlist.dll"
changelog: |-
  Rewrite injection to mirror BORNIOS/JellyTrend: drop IHostedService file patcher,
  serve watchlist.js as embedded resource via /Watchlist/watchlist.js, inject before
  </head> instead of </body>, skip buffered fallback if Content-Encoding header is
  already set. csproj uses ExcludeAssets=runtime + FrameworkReference Microsoft.AspNetCore.App.
