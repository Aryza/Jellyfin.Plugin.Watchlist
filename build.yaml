framework: "net9.0"
owner: "Ary"
category: "General"
overview: "Per-user watchlist with home-screen row and library tab."
description: >-
  Bookmark any movie or series from its detail page. Bookmarked items appear
  in a home-screen row (requires HomeScreenSections plugin) and a dedicated
  Watchlist tab (requires CustomTabs plugin). Items auto-remove when marked
  as played.
artifacts:
  - "Jellyfin.Plugin.Watchlist.dll"
changelog: |-
  Fix bookmark icon injection. FileTransformation keys callback pipelines by
  exact pattern string with a direct dict-lookup taking priority over regex
  fallback. Other IAmParadox27 plugins register under the literal pattern
  "index.html"; we were registering under "index\.html" which produced a
  separate (unreachable) pipeline. Switch to "index.html" so our callback
  joins the same pipeline that actually runs.
