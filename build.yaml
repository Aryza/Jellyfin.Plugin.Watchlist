overview: "Per-user watchlist with home-screen row and library tab."
description: >-
  Bookmark any movie or series from its detail page. Bookmarked items appear
  in a home-screen row (requires HomeScreenSections plugin) and a dedicated
  Watchlist tab (requires CustomTabs plugin). Items auto-remove when marked
  as played.
artifacts:
  - "Jellyfin.Plugin.Watchlist.dll"
changelog: |-
  Bookmark icons render at last. Jellyfin 10.11 web UI uses
  <button class="btnUserData ..." data-method="markFavorite"> for the favorite
  button (jellyfin-web src/components/userdatabuttons/userdatabuttons.js); old
  selectors (.btnFavorite, .btnUserDataFavorite, [data-action=favorite]) don't
  match. Add 10.11 selector to FAV_SELECTORS list. Inherit className/icon span
  from the favorite button so the bookmark sizes and aligns with it natively.
