version: "1.0.12.0"
targetAbi: "10.11.0.0"
framework: "net9.0"
owner: "Ary"
category: "General"
overview: "Per-user watchlist with home-screen row and library tab."
description: >-
  Bookmark any movie or series from its detail page. Bookmarked items appear
  in a home-screen row (requires HomeScreenSections plugin) and a dedicated
  Watchlist tab (requires CustomTabs plugin). Items auto-remove when marked
  as played.
artifacts:
  - "Jellyfin.Plugin.Watchlist.dll"
changelog: |-
  Switch controller authorization policy from bare [Authorize] to
  [Authorize(Policy = "DefaultAuthorization")]. The default fallback policy
  Jellyfin applies to plain [Authorize] doesn't admit normal authenticated
  users; DefaultAuthorization does.
