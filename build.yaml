targetAbi: "10.11.0.0"
framework: "net9.0"
owner: "Ary"
category: "General"
overview: "Per-user watchlist with home-screen row and library tab."
description: >-
  Bookmark any movie or series from its detail page. Bookmarked items appear
  in a home-screen row (requires HomeScreenSections plugin) and a dedicated
  Watchlist tab (requires CustomTabs plugin). Items auto-remove when marked
  as played.
artifacts:
  - "Jellyfin.Plugin.Watchlist.dll"
changelog: |-
  Use [Authorize(Policy = "FirstTimeSetupOrDefault")] — same policy
  Jellyfin's own LibraryController/LocalizationController use for normal-user
  endpoints. v1.0.12.0's "DefaultAuthorization" name does not exist in 10.11,
  caused 500 InvalidOperationException at request time. Drops [ResponseCache]
  from inject.js endpoint (conflicts with class-level [Authorize]).
